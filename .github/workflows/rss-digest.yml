name: RSS Digest

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write
  issues: write

concurrency:
  group: fluxa-rss-digest
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  STATE_BRANCH: rss-state
  PAGES_BRANCH: gh-pages
  TZ: Asia/Shanghai
  CNB_REPO: wwvo/Issuo
  CNB_ISSUE_LABELS: RSS
  CNB_ISSUE_ASSIGNEES: illegal_name_cnb.by9cbmyhqda,illegal_name_cnb.by9ca6eibfa

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Checkout rss-state
        id: checkout-state
        continue-on-error: true
        uses: actions/checkout@v6
        with:
          ref: ${{ env.STATE_BRANCH }}
          path: state-worktree
          fetch-depth: 1

      - name: Initialize rss-state
        if: steps.checkout-state.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          rm -rf state-worktree
          mkdir -p state-worktree/state
          cd state-worktree
          git init .
          git checkout -b "${STATE_BRANCH}"
          git remote add origin "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git"
          cat > state/state.json <<'JSON'
          {
            "schema_version": 1,
            "bootstrap_completed": false,
            "feeds": {}
          }
          JSON
          cat > state/publish-state.json <<'JSON'
          {
            "schema_version": 1,
            "latest_window_key": null,
            "windows": {}
          }
          JSON
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/state.json state/publish-state.json
          git commit -m "🔧 chore(state): 初始化 rss-state 分支"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run python -m unittest discover -s tests

      - name: Run Fluxa
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CNB_TOKEN: ${{ secrets.CNB_TOKEN }}
          CNB_REPO: ${{ env.CNB_REPO }}
          CNB_ISSUE_LABELS: ${{ env.CNB_ISSUE_LABELS }}
          CNB_ISSUE_ASSIGNEES: ${{ env.CNB_ISSUE_ASSIGNEES }}
          SITE_URL: ${{ vars.SITE_URL || format('https://{0}.github.io/{1}', github.repository_owner, github.event.repository.name) }}
          SITE_BASE_URL: ${{ vars.SITE_BASE_URL || format('/{0}', github.event.repository.name) }}
        run: >
          uv run fluxa
          --publisher github
          --publisher cnb
          --state-path state-worktree/state/state.json
          --publish-state-path state-worktree/state/publish-state.json
          --timezone ${{ env.TZ }}
          --run-id ${{ github.run_id }}

      - name: Deploy to GitHub Pages
        if: always()
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ ! -d dist ] || [ ! -f dist/index.html ]; then
            echo "dist 目录不存在或为空，跳过 GitHub Pages 部署"
            exit 0
          fi

          cd dist
          git init .
          git checkout -b "$PAGES_BRANCH"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          echo "" > .nojekyll
          git add -A
          git commit -m "🚀 deploy(pages): 更新 Fluxa Digest 静态站"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "$PAGES_BRANCH"

      - name: Commit state branch
        id: commit-state
        if: always()
        shell: bash
        working-directory: state-worktree
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --short -- state/state.json state/publish-state.json)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git add state/state.json state/publish-state.json
          git commit -m "🔧 chore(state): 更新 RSS 状态与发布账本"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push state branch
        if: always() && steps.commit-state.outputs.changed == 'true'
        working-directory: state-worktree
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:${{ env.STATE_BRANCH }}
